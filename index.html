<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат-бот Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-content">
                <img src="assets/bot_avatar.png" alt="Bot" class="avatar bot-avatar">
                <span class="bot-name">Чат-бот</span>
            </div>
            <div class="header-status">
                <span class="status-dot"></span>
                <span class="status-text">В сети</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Сообщения будут добавляться сюда -->
        </div>

        <div class="chat-input-container">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    rows="1" 
                    placeholder="Введите сообщение..."
                    maxlength="500"
                ></textarea>
                <button id="sendButton" disabled>
                    <img src="assets/paper-plane.svg" alt="Отправить">
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
